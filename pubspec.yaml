name: ble_explorer
description: "Professional BLE diagnostic suite — scan, inspect, diagnose, advertise & DFU update IoT devices."
publish_to: 'none'

# Semantic versioning: MAJOR.MINOR.PATCH+BUILD
# Bump versionCode (build number) for every Play Store / App Store upload
version: 1.0.0+2

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── BLE ────────────────────────────────────────────────────────
  # Upgraded to latest stable 2.x for improved reliability, queuing, and OS support.
  # Note: 1.30+ uses the FlutterBluePlus License (Free for individuals/small orgs).
  flutter_blue_plus: ^2.2.1

  # ── Permissions ────────────────────────────────────────────────
  permission_handler: ^11.3.1

  # ── Animation ──────────────────────────────────────────────────
  lottie: ^3.1.0

  # ── Graphing ───────────────────────────────────────────────────
  fl_chart: ^0.68.0

  # ── Export / Share ─────────────────────────────────────────────
  excel: ^4.0.6
  share_plus: ^10.0.2

  # ── File I/O ───────────────────────────────────────────────────
  path_provider: ^2.1.2

  # ── Date / Time formatting ─────────────────────────────────────
  intl: ^0.19.0
  nordic_dfu: ^7.1.2
  file_picker: ^11.0.2
  flutter_ble_peripheral: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # App icon generation: run `dart run flutter_launcher_icons`
  flutter_launcher_icons: ^0.14.3

# ── App Icon ───────────────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

# ── Flutter configuration ───────────────────────────────────────
flutter:
  uses-material-design: true

  assets:
    - assets/lottie/

