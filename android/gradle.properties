# ═══════════════════════════════════════════════════════════════
# Gradle / Android Build Properties — BLE Explorer
# ═══════════════════════════════════════════════════════════════

# JVM heap: generous allocation for large Gradle builds
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# AndroidX migration is complete — always on
android.useAndroidX=true

# Disable Jetifier (not needed for modern libraries)
android.enableJetifier=false

# Enable R8 full-mode for better code shrinking
android.enableR8.fullMode=true

# Kotlin incremental compilation
kotlin.incremental=true

# Parallel builds for faster CI
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true
