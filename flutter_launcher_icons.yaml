# flutter_launcher_icons.yaml
# Standalone config file (recommended over embedding in pubspec.yaml).
# Run: dart run flutter_launcher_icons
#
# This file is intentionally separate from pubspec.yaml to avoid
# the "Entrypoint isn't within the current project" Flutter tool error.

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#0A0E1A"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  web:
    generate: false
